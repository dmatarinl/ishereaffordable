services:
  - type: web
    name: is-here-affordable
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DEFAULT_CURRENCY
        value: EUR
      - key: SAFETY_MARGIN_PERCENT
        value: 15
