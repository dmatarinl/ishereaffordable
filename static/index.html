<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Is Here Affordable?</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #151515;
        --muted: #59626d;
        --line: #d8dee4;
        --paper: #f6f2e8;
        --panel: #ffffff;
        --accent: #126c63;
        --accent-dark: #0d514b;
        --warn: #a14a18;
        --soft: #eef4f3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: var(--paper);
        color: var(--ink);
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 30px;
      }

      .brand {
        font-weight: 850;
        font-size: 18px;
      }

      .domain {
        color: var(--muted);
        font-size: 14px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(280px, 0.8fr) minmax(0, 1.2fr);
        gap: 24px;
        align-items: start;
      }

      h1 {
        margin: 0;
        max-width: 760px;
        font-size: clamp(38px, 6vw, 74px);
        line-height: 0.96;
        letter-spacing: 0;
      }

      .intro {
        max-width: 620px;
        margin: 22px 0 0;
        font-size: 18px;
        line-height: 1.55;
        color: var(--muted);
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 18px 44px rgb(20 20 20 / 8%);
      }

      form {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        align-items: end;
        margin-bottom: 18px;
      }

      .field {
        display: grid;
        gap: 8px;
        font-size: 13px;
        font-weight: 750;
        color: var(--muted);
      }

      select,
      button,
      input {
        min-height: 46px;
        border-radius: 6px;
        font: inherit;
      }

      select,
      input {
        width: 100%;
        border: 1px solid var(--line);
        padding: 0 12px;
        background: #fff;
        color: var(--ink);
      }

      button {
        border: 0;
        padding: 0 18px;
        background: var(--accent);
        color: #fff;
        font-weight: 850;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-dark);
      }

      .settings-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .segmented {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 4px;
        padding: 4px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--soft);
      }

      .segmented.safety {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .segmented input[type="radio"] {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .segmented label {
        min-height: 38px;
        display: grid;
        place-items: center;
        border-radius: 6px;
        color: var(--muted);
        cursor: pointer;
        font-size: 12px;
        font-weight: 850;
        text-align: center;
      }

      .segmented label:has(input:checked) {
        background: #fff;
        color: var(--accent-dark);
        box-shadow: 0 1px 4px rgb(20 20 20 / 10%);
      }

      .custom-margin[hidden] {
        display: none;
      }

      .result[hidden] {
        display: none;
      }

      .amount {
        margin: 8px 0;
        font-size: clamp(38px, 6vw, 66px);
        line-height: 1;
        font-weight: 900;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin: 18px 0;
      }

      .metric {
        background: var(--soft);
        border-radius: 8px;
        padding: 12px;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
      }

      .metric strong {
        display: block;
        margin-top: 6px;
        font-size: 18px;
      }

      .breakdown {
        display: grid;
        gap: 8px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        padding: 12px 0;
        border-top: 1px solid var(--line);
      }

      .row:first-child {
        border-top: 0;
      }

      .row-title {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        font-weight: 800;
      }

      .badge {
        border-radius: 999px;
        padding: 3px 8px;
        background: var(--soft);
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .badge.low {
        background: #fff0e7;
        color: var(--warn);
      }

      .badge.mode {
        background: #e9f3f1;
        color: var(--accent-dark);
      }

      .badge.manual_seed {
        background: #fff0e7;
        color: var(--warn);
      }

      .badge.official_api {
        background: #e8f4ea;
        color: #236b38;
      }

      .badge.calculated {
        background: #eef0f3;
        color: var(--muted);
      }

      .source {
        margin-top: 5px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .warnings {
        margin-top: 16px;
        padding: 12px;
        border: 1px solid #e9c8b4;
        border-radius: 8px;
        color: var(--warn);
        background: #fff8f3;
        font-size: 13px;
      }

      .warnings ul {
        margin: 8px 0 0;
        padding-left: 18px;
      }

      @media (max-width: 860px) {
        .layout {
          grid-template-columns: 1fr;
        }

        form,
        .settings-grid,
        .summary {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="topbar">
        <div class="brand">Is Here Affordable?</div>
        <div class="domain">ishereaffordable.com</div>
      </header>

      <section class="layout">
        <div>
          <h1>Spain living costs, source by source.</h1>
          <p class="intro">
            Pick a supported city and see the monthly target for one adult renting
            a one-bedroom home, with each cost tied to a source and confidence level.
          </p>
        </div>

        <section class="panel" aria-label="Affordability calculator">
          <form id="calculator-form">
            <label class="field">
              City
              <select id="city" name="city"></select>
            </label>
            <div class="settings-grid">
              <div class="field">
                <span>Electricity profile</span>
                <div
                  class="segmented"
                  id="electricity-profile"
                  role="radiogroup"
                  aria-label="Electricity profile"
                ></div>
              </div>
              <div class="field">
                <span>Gas profile</span>
                <div
                  class="segmented"
                  id="gas-profile"
                  role="radiogroup"
                  aria-label="Gas profile"
                ></div>
              </div>
              <div class="field">
                <span>Safety margin</span>
                <div
                  class="segmented safety"
                  id="safety-margin"
                  role="radiogroup"
                  aria-label="Safety margin"
                >
                  <label>
                    <input type="radio" name="safety_margin_option" value="5" />
                    5%
                  </label>
                  <label>
                    <input type="radio" name="safety_margin_option" value="10" />
                    10%
                  </label>
                  <label>
                    <input
                      type="radio"
                      name="safety_margin_option"
                      value="15"
                      checked
                    />
                    15%
                  </label>
                  <label>
                    <input
                      type="radio"
                      name="safety_margin_option"
                      value="custom"
                    />
                    Custom
                  </label>
                </div>
                <input
                  class="custom-margin"
                  id="custom-safety-margin"
                  name="custom_safety_margin"
                  type="number"
                  min="0"
                  max="100"
                  step="0.5"
                  value="15"
                  hidden
                />
              </div>
            </div>
            <button type="submit">Calculate</button>
          </form>

          <div class="result" id="result" hidden></div>
        </section>
      </section>
    </main>

    <script>
      const form = document.querySelector("#calculator-form");
      const citySelect = document.querySelector("#city");
      const electricityProfileGroup = document.querySelector("#electricity-profile");
      const gasProfileGroup = document.querySelector("#gas-profile");
      const customSafetyMarginInput = document.querySelector("#custom-safety-margin");
      const result = document.querySelector("#result");

      const formatMoney = (value, currency) =>
        new Intl.NumberFormat("en", {
          style: "currency",
          currency,
          maximumFractionDigits: 0,
        }).format(value);

      const formatDate = (value) =>
        new Intl.DateTimeFormat("en", {
          dateStyle: "medium",
          timeStyle: "short",
        }).format(new Date(value));

      const categoryLabels = {
        rent: "Rent",
        electricity: "Electricity",
        gas: "Gas",
        water: "Water",
        trash_tax: "Trash tax",
        food: "Food",
        public_transport: "Public transport",
        safety_margin: "Safety margin",
      };

      const dataModeLabels = {
        official_api: "Official API",
        permitted_scrape: "Permitted scrape",
        manual_seed: "Cached fallback",
        calculated: "Calculated",
        unavailable: "Unavailable",
      };

      async function loadCities() {
        const response = await fetch("/api/cities");
        const payload = await response.json();
        citySelect.innerHTML = payload.cities
          .map((city) => `<option value="${city.key}">${city.name}</option>`)
          .join("");
      }

      async function loadElectricityProfiles() {
        const response = await fetch("/api/electricity/profiles");
        const payload = await response.json();
        electricityProfileGroup.innerHTML = payload.profiles
          .map(
            (profile) =>
              `<label>
                <input
                  type="radio"
                  name="electricity_profile"
                  value="${profile.key}"
                  ${profile.key === payload.default ? "checked" : ""}
                />
                ${profile.label}
              </label>`,
          )
          .join("");
      }

      async function loadGasProfiles() {
        const response = await fetch("/api/gas/profiles");
        const payload = await response.json();
        gasProfileGroup.innerHTML = payload.profiles
          .map(
            (profile) =>
              `<label>
                <input
                  type="radio"
                  name="gas_profile"
                  value="${profile.key}"
                  ${profile.key === payload.default ? "checked" : ""}
                />
                ${profile.label}
              </label>`,
          )
          .join("");
      }

      function selectedRadioValue(name) {
        return document.querySelector(`input[name="${name}"]:checked`)?.value;
      }

      function selectedSafetyMargin() {
        const option = selectedRadioValue("safety_margin_option");
        if (option === "custom") {
          return customSafetyMarginInput.value || "0";
        }
        return option || "15";
      }

      function updateCustomSafetyMarginVisibility() {
        const isCustom = selectedRadioValue("safety_margin_option") === "custom";
        customSafetyMarginInput.hidden = !isCustom;
      }

      function renderWarnings(warnings) {
        if (!warnings.length) return "";
        return `
          <div class="warnings">
            <strong>Data warnings</strong>
            <ul>${warnings.map((warning) => `<li>${warning}</li>`).join("")}</ul>
          </div>
        `;
      }

      function renderLineItem(item, currency) {
        const label = categoryLabels[item.category] ?? item.label;
        const confidenceClass = item.confidence === "low" ? "badge low" : "badge";
        const dataModeLabel = dataModeLabels[item.data_mode] ?? item.data_mode;
        const dataModeClass = `badge mode ${item.data_mode}`;
        const sourceTimeline = renderSourceTimeline(item);
        return `
          <div class="row">
            <div>
              <div class="row-title">
                <span>${label}</span>
                <span class="${dataModeClass}">${dataModeLabel}</span>
                <span class="${confidenceClass}">${item.confidence}</span>
              </div>
              <div class="source">
                ${item.source_name} · ${sourceTimeline}
                <br />${item.methodology}
              </div>
            </div>
            <strong>${formatMoney(item.monthly_amount, currency)}</strong>
          </div>
        `;
      }

      function renderSourceTimeline(item) {
        const cachedAt = item.cached_at ? formatDate(item.cached_at) : "unknown cache time";
        const observedAt = item.observed_at
          ? formatDate(item.observed_at)
          : "source observation unavailable";
        const validUntil = item.valid_until
          ? ` · valid until ${formatDate(item.valid_until)}`
          : "";

        if (item.data_mode === "manual_seed") {
          return `cached fallback ${cachedAt}${validUntil}`;
        }
        if (item.data_mode === "official_api") {
          return `official source observed ${observedAt} · cached ${cachedAt}${validUntil}`;
        }
        if (item.data_mode === "permitted_scrape") {
          return `permitted scrape observed ${observedAt} · cached ${cachedAt}${validUntil}`;
        }
        if (item.data_mode === "calculated") {
          return `calculated by formula ${cachedAt}${validUntil}`;
        }
        return `unavailable · cached ${cachedAt}${validUntil}`;
      }

      async function calculate() {
        const params = new URLSearchParams({
          city: citySelect.value,
          currency: "EUR",
          electricity_profile: selectedRadioValue("electricity_profile"),
          gas_profile: selectedRadioValue("gas_profile"),
          safety_margin_percent: selectedSafetyMargin(),
        });

        result.hidden = false;
        result.textContent = "Calculating...";

        const response = await fetch(`/api/affordability?${params.toString()}`);
        const estimate = await response.json();

        if (!response.ok) {
          result.innerHTML = `<div class="warnings">${estimate.detail}</div>`;
          return;
        }

        result.innerHTML = `
          <div>${estimate.city}, ${estimate.country}</div>
          <div class="amount">${formatMoney(estimate.monthly_required, estimate.currency)}</div>
          <div>per month</div>
          <div class="source">${estimate.profile}</div>
          <div class="summary">
            <div class="metric"><span>Baseline</span><strong>${formatMoney(estimate.monthly_baseline, estimate.currency)}</strong></div>
            <div class="metric"><span>Safety margin</span><strong>${formatMoney(estimate.monthly_safety_margin, estimate.currency)}</strong></div>
            <div class="metric"><span>Annual target</span><strong>${formatMoney(estimate.annual_required, estimate.currency)}</strong></div>
          </div>
          <div class="breakdown">
            ${estimate.line_items.map((item) => renderLineItem(item, estimate.currency)).join("")}
          </div>
          ${renderWarnings(estimate.warnings)}
        `;
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        calculate();
      });

      form.addEventListener("change", (event) => {
        if (event.target.name === "safety_margin_option") {
          updateCustomSafetyMarginVisibility();
        }
        if (
          event.target.name === "city" ||
          event.target.name === "electricity_profile" ||
          event.target.name === "gas_profile" ||
          event.target.name === "safety_margin_option"
        ) {
          calculate();
        }
      });

      customSafetyMarginInput.addEventListener("input", calculate);

      Promise.all([loadCities(), loadElectricityProfiles(), loadGasProfiles()]).then(
        calculate,
      );
    </script>
  </body>
</html>
