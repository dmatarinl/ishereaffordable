<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Is Here Affordable?</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #151515;
        --muted: #59626d;
        --line: #d8dee4;
        --paper: #f6f2e8;
        --panel: #ffffff;
        --accent: #126c63;
        --accent-dark: #0d514b;
        --warn: #a14a18;
        --soft: #eef4f3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: var(--paper);
        color: var(--ink);
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 30px;
      }

      .brand {
        font-weight: 850;
        font-size: 18px;
      }

      .domain {
        color: var(--muted);
        font-size: 14px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(280px, 0.8fr) minmax(0, 1.2fr);
        gap: 24px;
        align-items: start;
      }

      h1 {
        margin: 0;
        max-width: 760px;
        font-size: clamp(38px, 6vw, 74px);
        line-height: 0.96;
        letter-spacing: 0;
      }

      .intro {
        max-width: 620px;
        margin: 22px 0 0;
        font-size: 18px;
        line-height: 1.55;
        color: var(--muted);
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 18px 44px rgb(20 20 20 / 8%);
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: end;
        margin-bottom: 18px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 13px;
        font-weight: 750;
        color: var(--muted);
      }

      select,
      button {
        min-height: 46px;
        border-radius: 6px;
        font: inherit;
      }

      select {
        width: 100%;
        border: 1px solid var(--line);
        padding: 0 12px;
        background: #fff;
        color: var(--ink);
      }

      button {
        border: 0;
        padding: 0 18px;
        background: var(--accent);
        color: #fff;
        font-weight: 850;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-dark);
      }

      .result[hidden] {
        display: none;
      }

      .amount {
        margin: 8px 0;
        font-size: clamp(38px, 6vw, 66px);
        line-height: 1;
        font-weight: 900;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin: 18px 0;
      }

      .metric {
        background: var(--soft);
        border-radius: 8px;
        padding: 12px;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
      }

      .metric strong {
        display: block;
        margin-top: 6px;
        font-size: 18px;
      }

      .breakdown {
        display: grid;
        gap: 8px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        padding: 12px 0;
        border-top: 1px solid var(--line);
      }

      .row:first-child {
        border-top: 0;
      }

      .row-title {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        font-weight: 800;
      }

      .badge {
        border-radius: 999px;
        padding: 3px 8px;
        background: var(--soft);
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .badge.low {
        background: #fff0e7;
        color: var(--warn);
      }

      .source {
        margin-top: 5px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .warnings {
        margin-top: 16px;
        padding: 12px;
        border: 1px solid #e9c8b4;
        border-radius: 8px;
        color: var(--warn);
        background: #fff8f3;
        font-size: 13px;
      }

      .warnings ul {
        margin: 8px 0 0;
        padding-left: 18px;
      }

      @media (max-width: 860px) {
        .layout {
          grid-template-columns: 1fr;
        }

        form,
        .summary {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="topbar">
        <div class="brand">Is Here Affordable?</div>
        <div class="domain">ishereaffordable.com</div>
      </header>

      <section class="layout">
        <div>
          <h1>Spain living costs, source by source.</h1>
          <p class="intro">
            Pick a supported city and see the monthly target for one adult renting
            a one-bedroom home, with each cost tied to a source and confidence level.
          </p>
        </div>

        <section class="panel" aria-label="Affordability calculator">
          <form id="calculator-form">
            <label>
              City
              <select id="city" name="city"></select>
            </label>
            <button type="submit">Calculate</button>
          </form>

          <div class="result" id="result" hidden></div>
        </section>
      </section>
    </main>

    <script>
      const form = document.querySelector("#calculator-form");
      const citySelect = document.querySelector("#city");
      const result = document.querySelector("#result");

      const formatMoney = (value, currency) =>
        new Intl.NumberFormat("en", {
          style: "currency",
          currency,
          maximumFractionDigits: 0,
        }).format(value);

      const formatDate = (value) =>
        new Intl.DateTimeFormat("en", {
          dateStyle: "medium",
          timeStyle: "short",
        }).format(new Date(value));

      const categoryLabels = {
        rent: "Rent",
        electricity: "Electricity",
        gas: "Gas",
        water: "Water",
        trash_tax: "Trash tax",
        food: "Food",
        public_transport: "Public transport",
        safety_margin: "Safety margin",
      };

      async function loadCities() {
        const response = await fetch("/api/cities");
        const payload = await response.json();
        citySelect.innerHTML = payload.cities
          .map((city) => `<option value="${city.key}">${city.name}</option>`)
          .join("");
      }

      function renderWarnings(warnings) {
        if (!warnings.length) return "";
        return `
          <div class="warnings">
            <strong>Data warnings</strong>
            <ul>${warnings.map((warning) => `<li>${warning}</li>`).join("")}</ul>
          </div>
        `;
      }

      function renderLineItem(item, currency) {
        const label = categoryLabels[item.category] ?? item.label;
        const badgeClass = item.confidence === "low" ? "badge low" : "badge";
        return `
          <div class="row">
            <div>
              <div class="row-title">
                <span>${label}</span>
                <span class="${badgeClass}">${item.confidence}</span>
              </div>
              <div class="source">
                ${item.source_name} · observed ${formatDate(item.observed_at)}
                <br />${item.methodology}
              </div>
            </div>
            <strong>${formatMoney(item.monthly_amount, currency)}</strong>
          </div>
        `;
      }

      async function calculate() {
        const params = new URLSearchParams({
          city: citySelect.value,
          currency: "EUR",
        });

        result.hidden = false;
        result.textContent = "Calculating...";

        const response = await fetch(`/api/affordability?${params.toString()}`);
        const estimate = await response.json();

        if (!response.ok) {
          result.innerHTML = `<div class="warnings">${estimate.detail}</div>`;
          return;
        }

        result.innerHTML = `
          <div>${estimate.city}, ${estimate.country}</div>
          <div class="amount">${formatMoney(estimate.monthly_required, estimate.currency)}</div>
          <div>per month</div>
          <div class="summary">
            <div class="metric"><span>Baseline</span><strong>${formatMoney(estimate.monthly_baseline, estimate.currency)}</strong></div>
            <div class="metric"><span>Safety margin</span><strong>${formatMoney(estimate.monthly_safety_margin, estimate.currency)}</strong></div>
            <div class="metric"><span>Annual target</span><strong>${formatMoney(estimate.annual_required, estimate.currency)}</strong></div>
          </div>
          <div class="breakdown">
            ${estimate.line_items.map((item) => renderLineItem(item, estimate.currency)).join("")}
          </div>
          ${renderWarnings(estimate.warnings)}
        `;
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        calculate();
      });

      loadCities().then(calculate);
    </script>
  </body>
</html>
